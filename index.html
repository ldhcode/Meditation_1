<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c14">
<title>息 · 正念冥想</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --ink: #e8e4dc;
  --ink2: rgba(232,228,220,.5);
  --ink3: rgba(232,228,220,.25);
  --accent: #7db8a4;
  --accent2: #a08bc8;
  --deep: #080c14;
  --ease: cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--deep);font-family:'PingFang SC','Helvetica Neue',sans-serif}

/* ─── canvas bg ─── */
#canvas{position:fixed;inset:0;z-index:0}

/* ─── app shell ─── */
#app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,24px) 28px env(safe-area-inset-bottom,32px)}

/* ─── header ─── */
.header{width:100%;display:flex;align-items:center;justify-content:space-between;padding-top:8px}
.logo{font-size:22px;font-weight:300;letter-spacing:.15em;color:var(--ink)}
.session-badge{font-size:11px;letter-spacing:.12em;color:var(--ink2);border:1px solid var(--ink3);border-radius:20px;padding:4px 12px}

/* ─── step dots ─── */
.dots{display:flex;gap:7px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:var(--ink3);transition:all .4s var(--ease)}
.dot.cur{background:var(--accent);width:18px;border-radius:3px}
.dot.done{background:var(--ink2)}

/* ─── center stage ─── */
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;width:100%}

/* ─── orb ─── */
.orb-wrap{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center}
.orb-ring{position:absolute;border-radius:50%;border:1px solid rgba(125,184,164,.15);animation:ripple 3.5s ease-out infinite}
.orb-ring:nth-child(1){width:200px;height:200px;animation-delay:0s}
.orb-ring:nth-child(2){width:160px;height:160px;animation-delay:1.1s}
.orb-ring:nth-child(3){width:120px;height:120px;animation-delay:2.2s}
@keyframes ripple{0%{opacity:.5;transform:scale(.85)}100%{opacity:0;transform:scale(1.1)}}
.orb{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform 1s var(--ease),background .8s,box-shadow .8s;position:relative;z-index:1}
.orb-label{font-size:12px;letter-spacing:.1em;color:rgba(232,228,220,.7);font-weight:300}

/* breath states */
.orb.inhale{transform:scale(1.5);animation:none}
.orb.hold{transform:scale(1.5)}
.orb.exhale{transform:scale(1);animation:none}

/* ─── phase text ─── */
.phase-area{margin-top:20px;text-align:center;min-height:52px;display:flex;flex-direction:column;align-items:center;gap:6px}
.phase-name{font-size:13px;letter-spacing:.18em;color:var(--ink2);text-transform:uppercase;font-weight:300}
.phase-count{font-size:36px;font-weight:200;color:var(--ink);letter-spacing:-.01em;min-width:48px;text-align:center;line-height:1}

/* ─── instruction ─── */
.instruction{text-align:center;max-width:280px}
.instruction h2{font-size:22px;font-weight:300;color:var(--ink);letter-spacing:.04em;margin-bottom:10px;line-height:1.35}
.instruction p{font-size:14px;color:var(--ink2);line-height:1.75;font-weight:300}

/* ─── music strip ─── */
.music-strip{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 16px;width:100%;max-width:320px}
.music-name{font-size:12px;color:var(--ink2);flex:1;letter-spacing:.04em}
.waveform{display:flex;align-items:flex-end;gap:2px;height:16px}
.wb{width:3px;border-radius:2px;background:var(--accent);opacity:.6}

/* ─── controls ─── */
.controls{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;align-items:center}
.btn-primary{width:100%;padding:17px;border-radius:16px;border:none;font-size:16px;font-weight:400;letter-spacing:.08em;cursor:pointer;color:#fff;transition:opacity .2s,transform .1s;position:relative;overflow:hidden}
.btn-primary:active{transform:scale(.97);opacity:.85}
.btn-ghost{background:transparent;border:1px solid var(--ink3);color:var(--ink2);width:100%;padding:13px;border-radius:14px;font-size:13px;letter-spacing:.06em;cursor:pointer;transition:border-color .2s,color .2s}
.btn-ghost:hover{border-color:var(--ink2);color:var(--ink)}

/* ─── transitions ─── */
.fade-enter{animation:fadeUp .5s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ─── completion screen ─── */
.stat-row{display:flex;gap:24px;justify-content:center;margin:8px 0}
.stat{text-align:center}
.stat-num{font-size:32px;font-weight:200;color:var(--ink)}
.stat-label{font-size:11px;letter-spacing:.12em;color:var(--ink2);margin-top:2px}

/* ─── install banner ─── */
#install-banner{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(8,12,20,.95);border-top:1px solid rgba(255,255,255,.08);padding:16px 24px;z-index:99;flex-direction:column;gap:8px}
#install-banner p{font-size:13px;color:var(--ink2);line-height:1.5}
#install-banner strong{color:var(--ink)}
.banner-row{display:flex;gap:10px}
.btn-install{flex:1;padding:11px;border-radius:12px;border:none;font-size:14px;cursor:pointer;background:var(--accent);color:#fff;letter-spacing:.04em}
.btn-dismiss{flex:1;padding:11px;border-radius:12px;border:1px solid var(--ink3);background:transparent;color:var(--ink2);font-size:14px;cursor:pointer}

/* ─── reduced motion ─── */
@media(prefers-reduced-motion:reduce){
  .orb-ring,.wb{animation:none!important}
  .orb{transition:none}
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="app">
  <div class="header">
    <div class="logo">息</div>
    <div class="session-badge" id="session-badge">第 1 次练习</div>
  </div>
  <div class="dots" id="dots"></div>
  <div class="stage" id="stage"></div>
  <div id="controls-area"></div>
</div>

<div id="install-banner">
  <p><strong>添加到主屏幕</strong>，随时打开，离线可用</p>
  <div class="banner-row">
    <button class="btn-install" id="btn-install">添加到主屏幕</button>
    <button class="btn-dismiss" id="btn-dismiss">稍后再说</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   CANVAS PARTICLE BACKGROUND
═══════════════════════════════════════════ */
(function(){
  const c = document.getElementById('canvas');
  const ctx = c.getContext('2d');
  let W,H,pts=[],hue=210;

  function resize(){
    W=c.width=innerWidth; H=c.height=innerHeight;
  }
  resize(); addEventListener('resize',resize);

  for(let i=0;i<55;i++) pts.push({
    x:Math.random()*1200-100, y:Math.random()*800-100,
    vx:(Math.random()-.5)*.18, vy:(Math.random()-.5)*.12,
    r:Math.random()*1.8+.4, a:Math.random()*.4+.05
  });

  function draw(){
    ctx.clearRect(0,0,W,H);
    // subtle gradient sky
    const g=ctx.createRadialGradient(W*.5,H*.35,0,W*.5,H*.35,H*.9);
    g.addColorStop(0,`hsla(${hue},30%,8%,1)`);
    g.addColorStop(1,'hsla(220,25%,4%,1)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<-20)p.x=W+20; if(p.x>W+20)p.x=-20;
      if(p.y<-20)p.y=H+20; if(p.y>H+20)p.y=-20;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,210,200,${p.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
  window.setHue=function(h,sat,light){hue=h;}
})();

/* ═══════════════════════════════════════════
   WEB AUDIO ENGINE — 纯自然声版
═══════════════════════════════════════════ */
const Audio = (function(){
  let ctx, nodes={}, timers=[];

  function ensure(){
    if(!ctx) ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==='suspended') ctx.resume();
  }

  /* ── 基础噪声生成器 ── */
  function mkNoise(type, seconds){
    seconds=seconds||4;
    const rate=ctx.sampleRate;
    const buf=ctx.createBuffer(2,rate*seconds,rate);
    for(let ch=0;ch<2;ch++){
      const d=buf.getChannelData(ch);
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0,last=0;
      for(let i=0;i<d.length;i++){
        const w=Math.random()*2-1;
        if(type==='pink'){
          b0=.99886*b0+w*.0555179; b1=.99332*b1+w*.0750759;
          b2=.96900*b2+w*.1538520; b3=.86650*b3+w*.3104856;
          b4=.55000*b4+w*.5329522; b5=-.7616*b5-w*.0168980;
          d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*0.11; b6=w*.115926;
        } else if(type==='brown'){
          d[i]=(last+.02*w)/1.02; last=d[i]; d[i]*=3.5;
        } else { d[i]=w; }
      }
    }
    const src=ctx.createBufferSource();
    src.buffer=buf; src.loop=true; return src;
  }

  /* ── 通用滤波链 ── */
  function chain(src, filters, gainVal){
    let node=src;
    filters.forEach(f=>{ node.connect(f); node=f; });
    const g=ctx.createGain(); g.gain.value=gainVal;
    node.connect(g); g.connect(ctx.destination);
    src.start(); nodes.noiseGain=g; nodes.noiseNode=src;
    return g;
  }

  /* ── LFO调制 ── */
  function lfo(target, rate, depth){
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.frequency.value=rate; g.gain.value=depth;
    o.connect(g); g.connect(target); o.start();
    nodes['lfo_'+Date.now()]=o; return o;
  }

  /* ── 单音滴水 ── */
  function droplet(freq, delay, dur){
    const osc=ctx.createOscillator(), env=ctx.createGain();
    osc.type='sine'; osc.frequency.value=freq;
    const t=ctx.currentTime+delay;
    env.gain.setValueAtTime(0,t);
    env.gain.linearRampToValueAtTime(.06,t+.01);
    env.gain.exponentialRampToValueAtTime(.0001,t+dur);
    osc.connect(env); env.connect(ctx.destination);
    osc.start(t); osc.stop(t+dur+.05);
  }

  /* ── 随机水滴序列 ── */
  function startDroplets(minF,maxF,minI,maxI){
    function sched(){
      const freq=minF+Math.random()*(maxF-minF);
      const interval=(minI+Math.random()*(maxI-minI))/1000;
      droplet(freq,0,.6+Math.random()*.8);
      const t=setTimeout(sched,(minI+Math.random()*(maxI-minI)));
      timers.push(t);
    }
    sched();
  }

  /* ── 鸟鸣合成（频率调制）── */
  function chirp(baseFreq, delay){
    const mod=ctx.createOscillator(), modG=ctx.createGain();
    const car=ctx.createOscillator(), env=ctx.createGain();
    mod.frequency.value=12; modG.gain.value=baseFreq*.3;
    car.frequency.value=baseFreq; car.type='sine';
    mod.connect(modG); modG.connect(car.frequency);
    car.connect(env); env.connect(ctx.destination);
    const t=ctx.currentTime+delay;
    env.gain.setValueAtTime(0,t);
    env.gain.linearRampToValueAtTime(.04,t+.05);
    env.gain.exponentialRampToValueAtTime(.0001,t+.35);
    mod.start(t); car.start(t);
    mod.stop(t+.4); car.stop(t+.4);
  }

  /* ── 随机鸟鸣 ── */
  function startBirds(){
    const birds=[2800,3200,2400,3600,2600,4000,1800,3000];
    function sched(){
      const f=birds[Math.floor(Math.random()*birds.length)];
      chirp(f,0);
      if(Math.random()>.5) chirp(f*1.04,.12);
      if(Math.random()>.7) chirp(f*.96,.24);
      const wait=2500+Math.random()*5000;
      timers.push(setTimeout(sched,wait));
    }
    timers.push(setTimeout(sched,1000+Math.random()*2000));
  }

  /* ── 雨声 ── */
  function startRain(intensity){
    intensity=intensity||1;
    const pink=mkNoise('pink',4);
    const hi=ctx.createBiquadFilter(); hi.type='highpass'; hi.frequency.value=1200;
    const mid=ctx.createBiquadFilter(); mid.type='peaking'; mid.frequency.value=3000; mid.gain.value=6;
    const lo=ctx.createBiquadFilter(); lo.type='lowpass'; lo.frequency.value=8000;
    chain(pink,[hi,mid,lo],.12*intensity);
    // 大雨滴噼啪声
    const brown=mkNoise('brown',3);
    const bf=ctx.createBiquadFilter(); bf.type='bandpass'; bf.frequency.value=400; bf.Q.value=.3;
    const bg=ctx.createGain(); bg.gain.value=.06*intensity;
    brown.connect(bf); bf.connect(bg); bg.connect(ctx.destination); brown.start();
    nodes.noiseNode2=brown;
    // LFO模拟阵雨强弱
    lfo(nodes.noiseGain.gain,.07,.04*intensity);
  }

  /* ── 溪流声 ── */
  function startStream(){
    const pink=mkNoise('pink',5);
    const lo=ctx.createBiquadFilter(); lo.type='lowpass'; lo.frequency.value=2500;
    const peak=ctx.createBiquadFilter(); peak.type='peaking'; peak.frequency.value=600; peak.gain.value=4;
    chain(pink,[lo,peak],.2);
    lfo(nodes.noiseGain.gain,.18,.06);
    lfo(lo.frequency,.13,400);
    startDroplets(350,900,800,3000);
  }

  /* ── 海浪声 ── */
  function startOcean(){
    const brown=mkNoise('brown',6);
    const lo=ctx.createBiquadFilter(); lo.type='lowpass'; lo.frequency.value=700;
    const peak=ctx.createBiquadFilter(); peak.type='peaking'; peak.frequency.value=200; peak.gain.value=5;
    chain(brown,[lo,peak],.28);
    lfo(nodes.noiseGain.gain,.06,.1);
    lfo(lo.frequency,.05,200);
    // 浪花高频
    const white=mkNoise('pink',3);
    const hf=ctx.createBiquadFilter(); hf.type='highpass'; hf.frequency.value=3000;
    const hg=ctx.createGain(); hg.gain.value=.05;
    const hlfo=ctx.createOscillator(), hlfoG=ctx.createGain();
    hlfo.frequency.value=.08; hlfoG.gain.value=.04;
    hlfo.connect(hlfoG); hlfoG.connect(hg.gain);
    white.connect(hf); hf.connect(hg); hg.connect(ctx.destination);
    white.start(); hlfo.start();
    nodes.noiseNode2=white; nodes.lfo2=hlfo;
  }

  /* ── 森林清晨 ── */
  function startForest(){
    // 微风底层
    const pink=mkNoise('pink',5);
    const lo=ctx.createBiquadFilter(); lo.type='lowpass'; lo.frequency.value=1800;
    const hi=ctx.createBiquadFilter(); hi.type='highpass'; hi.frequency.value=200;
    chain(pink,[lo,hi],.08);
    lfo(nodes.noiseGain.gain,.09,.025);
    // 树叶沙沙（高频粉噪）
    const leaf=mkNoise('pink',3);
    const lf=ctx.createBiquadFilter(); lf.type='highpass'; lf.frequency.value=4000;
    const lg=ctx.createGain(); lg.gain.value=.06;
    leaf.connect(lf); lf.connect(lg); lg.connect(ctx.destination); leaf.start();
    nodes.noiseNode2=leaf;
    lfo(lg.gain,.14,.03);
    // 鸟鸣
    startBirds();
    // 偶尔水滴
    startDroplets(600,1200,4000,9000);
  }

  const presets={
    nature:{ label:'山涧溪流 · 流水潺潺', fn: startStream },
    ocean:{  label:'海浪声   · 潮涌潮退', fn: startOcean  },
    forest:{ label:'森林清晨 · 百鸟晨鸣', fn: startForest },
    rain:{   label:'山间细雨 · 雨打芭蕉', fn: ()=>startRain(1) }
  };

  /* ── 入场铃声（纯正弦衰减）── */
  function bell(freq,gain){
    ensure();
    [1,2,3].forEach((h,i)=>{
      const o=ctx.createOscillator(), e=ctx.createGain();
      o.type='sine'; o.frequency.value=freq*h;
      e.gain.setValueAtTime(0,ctx.currentTime);
      e.gain.linearRampToValueAtTime(gain/(i+1),ctx.currentTime+.02);
      e.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+4-i*.5);
      o.connect(e); e.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime+4.5);
    });
  }

  return{
    play:function(preset){
      ensure(); this.stop();
      if(presets[preset]){ presets[preset].fn(); }
      return presets[preset]?.label||'';
    },
    stop:function(){
      timers.forEach(t=>clearTimeout(t)); timers=[];
      ['noiseNode','noiseNode2','lfo','lfo2'].forEach(k=>{
        if(nodes[k]){ try{nodes[k].stop();}catch(e){} }
      });
      Object.keys(nodes).forEach(k=>{
        if(k.startsWith('lfo_')){ try{nodes[k].stop();}catch(e){} }
      });
      nodes={};
    },
    fadeOut:function(){
      if(nodes.noiseGain){
        nodes.noiseGain.gain.linearRampToValueAtTime(0,ctx.currentTime+2.5);
      }
      if(nodes.noiseNode2){
        try{
          const tmp=ctx.createGain();
          tmp.gain.linearRampToValueAtTime(0,ctx.currentTime+2.5);
        }catch(e){}
      }
      setTimeout(()=>this.stop(),2800);
    },
    ringBell:function(){ bell(528,.1); }
  };
})();

/* ═══════════════════════════════════════════
   SESSION DATA
═══════════════════════════════════════════ */
let sessions = parseInt(localStorage.getItem('xi_sessions')||'0');
let totalMin = parseInt(localStorage.getItem('xi_minutes')||'0');
document.getElementById('session-badge').textContent = `第 ${sessions+1} 次练习`;

/* ═══════════════════════════════════════════
   DURATION CONFIG
   durations in seconds per step (4 practice steps)
   ratios: settle 15%, breath 35%, observe 30%, return 20%
═══════════════════════════════════════════ */
const DURATION_OPTIONS=[
  {label:'5 分钟', mins:5},
  {label:'10 分钟', mins:10},
  {label:'20 分钟', mins:20},
  {label:'自定义', mins:null},
];
let selectedMins=10;

// step durations derived from total
function getStepDurations(totalSecs){
  return [
    Math.round(totalSecs*.15), // settle
    Math.round(totalSecs*.35), // breath
    Math.round(totalSecs*.30), // observe
    Math.round(totalSecs*.20), // return
  ];
}

/* ═══════════════════════════════════════════
   STEPS DEFINITION
═══════════════════════════════════════════ */
const STEPS=[
  {
    id:'welcome',
    title:'息',
    sub:'正念冥想\n为自己留一段安静的时光',
    orbColor:'rgba(90,130,180,.3)',
    orbShadow:'0 0 40px rgba(90,130,180,.2)',
    hue:215, sound:null, breathMode:false,
    btn:'开始练习',
    btnGrad:'linear-gradient(135deg,#4a7898,#6a9ab8)',
    ghost:null, hasDuration:true
  },
  {
    id:'settle', title:'落地', sub:'感受身体与地面的接触\n让重力把你带到此刻',
    orbColor:'rgba(80,155,175,.32)', orbShadow:'0 0 50px rgba(80,155,175,.18)',
    hue:195, sound:'nature', breathMode:false,
    btn:'继续', btnGrad:'rgba(255,255,255,.08)', ghost:'跳过'
  },
  {
    id:'breath', title:'随息', sub:'把全部注意力放在呼吸上\n只是感受，不需要控制',
    orbColor:'rgba(80,175,140,.35)', orbShadow:'0 0 60px rgba(80,175,140,.2)',
    hue:162, sound:'ocean', breathMode:true,
    btn:'继续', btnGrad:'rgba(255,255,255,.08)', ghost:'暂停音频'
  },
  {
    id:'observe', title:'观照', sub:'念头升起，如云朵飘过\n你是天空，不是云',
    orbColor:'rgba(140,100,200,.3)', orbShadow:'0 0 55px rgba(140,100,200,.18)',
    hue:265, sound:'rain', breathMode:false,
    btn:'继续', btnGrad:'rgba(255,255,255,.08)', ghost:'暂停音频'
  },
  {
    id:'return', title:'归来', sub:'轻轻地回到呼吸\n每一次回来，都是成功',
    orbColor:'rgba(80,175,130,.38)', orbShadow:'0 0 60px rgba(80,175,130,.22)',
    hue:155, sound:'forest', breathMode:true,
    btn:'完成练习', btnGrad:'linear-gradient(135deg,#3a7a5a,#5aa07a)', ghost:null
  },
  {
    id:'done', title:'完成', sub:null,
    orbColor:'rgba(160,139,200,.28)', orbShadow:'0 0 50px rgba(160,139,200,.2)',
    hue:270, sound:null, breathMode:false,
    btn:'再次练习', btnGrad:'rgba(255,255,255,.08)', ghost:'分享给朋友'
  }
];

/* ═══════════════════════════════════════════
   BREATH CONTROLLER
═══════════════════════════════════════════ */
let breathInterval=null, breathPhase='inhale', breathCount=4;
const phases=[
  {name:'吸气',dur:4,state:'inhale'},
  {name:'屏息',dur:4,state:'hold'},
  {name:'呼气',dur:6,state:'exhale'},
];
let phaseIdx=0;

function startBreath(){
  stopBreath(); phaseIdx=0; runBreath();
}
function runBreath(){
  const p=phases[phaseIdx];
  breathPhase=p.state; breathCount=p.dur;
  updateOrbState(); setPhaseUI(p.name,breathCount);
  breathInterval=setInterval(()=>{
    breathCount--;
    setPhaseUI(p.name,breathCount);
    if(breathCount<=0){
      clearInterval(breathInterval);
      phaseIdx=(phaseIdx+1)%phases.length;
      runBreath();
    }
  },1000);
}
function stopBreath(){ clearInterval(breathInterval); breathInterval=null; }
function setPhaseUI(name,count){
  const pn=document.getElementById('phase-name');
  const pc=document.getElementById('phase-count');
  if(pn) pn.textContent=name;
  if(pc) pc.textContent=count;
}
function updateOrbState(){
  const orb=document.getElementById('orb');
  if(orb) orb.className='orb '+breathPhase;
}

/* ═══════════════════════════════════════════
   STEP COUNTDOWN TIMER
═══════════════════════════════════════════ */
let countdownInterval=null, countdownSecs=0;

function startCountdown(totalSecs, onDone){
  clearInterval(countdownInterval);
  countdownSecs=totalSecs;
  updateCountdownUI();
  countdownInterval=setInterval(()=>{
    countdownSecs--;
    updateCountdownUI();
    if(countdownSecs<=0){
      clearInterval(countdownInterval);
      Audio.ringBell();
      setTimeout(()=>{ if(onDone) onDone(); },1200);
    }
  },1000);
}

function stopCountdown(){ clearInterval(countdownInterval); countdownInterval=null; }

function updateCountdownUI(){
  const el=document.getElementById('step-timer');
  if(!el) return;
  const m=Math.floor(countdownSecs/60);
  const s=countdownSecs%60;
  el.textContent=`${m}:${s.toString().padStart(2,'0')}`;
  // arc progress
  const arc=document.getElementById('timer-arc');
  if(arc && countdownSecs>=0){
    const total=parseInt(arc.dataset.total)||1;
    const pct=(countdownSecs/total);
    const r=44, circ=2*Math.PI*r;
    arc.style.strokeDashoffset=(circ*pct).toFixed(1);
  }
}

function fmtMins(secs){ return Math.round(secs/60)||1; }

/* ═══════════════════════════════════════════
   WAVEFORM
═══════════════════════════════════════════ */
function makeWaveform(){
  return [10,6,13,5,11,8,14,6,9,5,12,7].map((h,i)=>
    `<div class="wb" style="height:${h}px;animation:waveAnim ${(.4+i*.07).toFixed(2)}s ${(i*.06).toFixed(2)}s ease-in-out infinite alternate"></div>`
  ).join('');
}

/* ═══════════════════════════════════════════
   DURATION PICKER HTML
═══════════════════════════════════════════ */
function durationPickerHTML(){
  const opts=DURATION_OPTIONS.map(o=>`
    <button class="dur-btn${o.mins===selectedMins?'  dur-active':''}"
      onclick="selectDuration(${o.mins})">${o.label}</button>
  `).join('');
  return `
    <div class="dur-wrap">
      <div class="dur-label">选择练习时长</div>
      <div class="dur-grid">${opts}</div>
      <div id="custom-input" style="display:${selectedMins===null?'flex':'none'};align-items:center;gap:8px;margin-top:10px;justify-content:center">
        <input type="number" id="custom-mins" min="1" max="60" value="15"
          style="width:60px;padding:6px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:#e8e4dc;font-size:16px;text-align:center">
        <span style="font-size:13px;color:rgba(232,228,220,.5)">分钟</span>
      </div>
    </div>`;
}

window.selectDuration=function(mins){
  selectedMins=mins;
  const ci=document.getElementById('custom-input');
  if(ci) ci.style.display=mins===null?'flex':'none';
  document.querySelectorAll('.dur-btn').forEach(b=>{
    b.classList.toggle('dur-active', b.textContent.trim()===DURATION_OPTIONS.find(o=>o.mins===mins)?.label);
  });
};

/* ═══════════════════════════════════════════
   RENDER STEP
═══════════════════════════════════════════ */
let currentStep=0, audioMuted=false, sessionStartTime=0;

function render(idx){
  stopBreath(); stopCountdown();
  currentStep=idx;
  const s=STEPS[idx];
  setHue(s.hue);

  // dots (exclude welcome + done)
  const practiceSteps=STEPS.filter(x=>!['welcome','done'].includes(x.id));
  const practiceIdx=practiceSteps.findIndex(x=>x.id===s.id);
  const dotsEl=document.getElementById('dots');
  dotsEl.innerHTML=practiceSteps.map((_,i)=>{
    const cl=i<practiceIdx?'dot done':i===practiceIdx?'dot cur':'dot';
    return `<div class="${cl}"></div>`;
  }).join('');

  if(s.sound && !audioMuted) Audio.play(s.sound);
  else if(!s.sound) Audio.fadeOut();
  if(idx===1||idx===5) Audio.ringBell();

  // compute step durations
  const totalSecs=(selectedMins||15)*60;
  const stepDurs=getStepDurations(totalSecs);
  // map practice step index to duration
  const stepDurMap={settle:stepDurs[0],breath:stepDurs[1],observe:stepDurs[2],return:stepDurs[3]};
  const thisDur=stepDurMap[s.id]||0;

  let stageHTML='';

  if(s.id==='welcome'){
    stageHTML=`
      <div class="orb-wrap">
        <div class="orb-ring"></div><div class="orb-ring"></div>
        <div class="orb" id="orb" style="background:${s.orbColor};box-shadow:${s.orbShadow}">
          <div class="orb-label">息</div>
        </div>
      </div>
      <div class="phase-area"></div>
      <div class="instruction fade-enter">
        <h2>${s.title}</h2>
        <p>${s.sub.replace('\n','<br>')}</p>
      </div>`;

  } else if(s.id==='done'){
    const elapsed=sessionStartTime?Math.round((Date.now()-sessionStartTime)/60000):selectedMins||10;
    sessions++; totalMin+=elapsed;
    localStorage.setItem('xi_sessions',sessions);
    localStorage.setItem('xi_minutes',totalMin);
    stageHTML=`
      <div class="orb-wrap">
        <div class="orb-ring"></div><div class="orb-ring"></div>
        <div class="orb" id="orb" style="background:${s.orbColor};box-shadow:${s.orbShadow}">
          <div class="orb-label">✓</div>
        </div>
      </div>
      <div class="phase-area"></div>
      <div class="instruction fade-enter" style="margin-top:20px">
        <h2>很好。</h2>
        <p>你给了自己 ${elapsed} 分钟安静的时光</p>
      </div>
      <div class="stat-row" style="margin-top:20px">
        <div class="stat"><div class="stat-num">${sessions}</div><div class="stat-label">次练习</div></div>
        <div class="stat"><div class="stat-num">${totalMin}</div><div class="stat-label">累计分钟</div></div>
        <div class="stat"><div class="stat-num">${Math.ceil(sessions/7)}</div><div class="stat-label">完整周数</div></div>
      </div>`;

  } else {
    // practice step — with arc timer
    const arcR=44, arcCirc=(2*Math.PI*arcR).toFixed(1);
    stageHTML=`
      <div class="orb-wrap" style="position:relative">
        <svg width="200" height="200" style="position:absolute;top:0;left:0;transform:rotate(-90deg)">
          <circle cx="100" cy="100" r="${arcR}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="2"/>
          <circle id="timer-arc" cx="100" cy="100" r="${arcR}" fill="none"
            stroke="rgba(255,255,255,.22)" stroke-width="2"
            stroke-dasharray="${arcCirc}" stroke-dashoffset="0"
            data-total="${thisDur}"
            style="transition:stroke-dashoffset 1s linear"/>
        </svg>
        <div class="orb-ring"></div><div class="orb-ring"></div><div class="orb-ring"></div>
        <div class="orb" id="orb" style="background:${s.orbColor};box-shadow:${s.orbShadow}">
          <div class="orb-label" id="step-timer">${fmtMins(thisDur)}:00</div>
        </div>
      </div>
      <div class="phase-area">
        <div class="phase-name" id="phase-name">${s.breathMode?'吸气':''}</div>
        <div class="phase-count" id="phase-count">${s.breathMode?'4':''}</div>
      </div>
      <div class="instruction fade-enter" style="margin-top:${s.breathMode?'4px':'16px'}">
        <h2>${s.title}</h2>
        <p>${s.sub.replace('\n','<br>')}</p>
      </div>`;
  }

  document.getElementById('stage').innerHTML=stageHTML;

  // start timers for practice steps
  if(!['welcome','done'].includes(s.id) && thisDur>0){
    if(idx===1) sessionStartTime=Date.now();
    startCountdown(thisDur, ()=>nextStep());
  }
  if(s.breathMode) startBreath();

  // controls
  let soundLabel='';
  if(s.sound) soundLabel=Audio.play(s.sound);

  const musicHTML=s.sound?`
    <div class="music-strip">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(232,228,220,.4)" stroke-width="1.5" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <span class="music-name">${soundLabel||'环境音乐'}</span>
      <div class="waveform">${makeWaveform()}</div>
    </div>`:'';

  const durHTML=s.hasDuration?durationPickerHTML():'';

  const ghostHTML=s.ghost?`<button class="btn-ghost" onclick="ghostAction()">${s.ghost}</button>`:'';

  document.getElementById('controls-area').innerHTML=`
    <div class="controls">
      ${durHTML}
      ${musicHTML}
      <button class="btn-primary" style="background:${s.btnGrad}" onclick="nextStep()">${s.btn}</button>
      ${ghostHTML}
    </div>`;
}

function nextStep(){
  if(currentStep<STEPS.length-1){
    // read custom duration if set
    if(selectedMins===null){
      const v=parseInt(document.getElementById('custom-mins')?.value)||15;
      selectedMins=Math.min(60,Math.max(1,v));
    }
    render(currentStep+1);
  } else { render(0); }
}

function ghostAction(){
  const s=STEPS[currentStep];
  if(s.ghost==='跳过'){ stopCountdown(); render(currentStep+1); }
  else if(s.ghost==='暂停音频'){
    audioMuted=!audioMuted;
    if(audioMuted) Audio.stop();
    else if(s.sound) Audio.play(s.sound);
  } else if(s.ghost==='分享给朋友'){
    if(navigator.share){
      navigator.share({title:'息 · 正念冥想',text:`我刚刚完成了 ${selectedMins||10} 分钟正念冥想 🌿`,url:location.href});
    } else {
      navigator.clipboard?.writeText(location.href);
      alert('链接已复制，分享给朋友吧');
    }
  }
}

/* ═══════════════════════════════════════════
   PWA INSTALL
═══════════════════════════════════════════ */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  setTimeout(()=>{ document.getElementById('install-banner').style.display='flex'; },8000);
});
document.getElementById('btn-install').onclick=()=>{
  if(deferredPrompt) deferredPrompt.prompt();
  document.getElementById('install-banner').style.display='none';
};
document.getElementById('btn-dismiss').onclick=()=>{
  document.getElementById('install-banner').style.display='none';
};

render(0);
</script>
