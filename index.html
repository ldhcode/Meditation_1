<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c14">
<title>息 · 正念冥想</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --ink: #e8e4dc;
  --ink2: rgba(232,228,220,.5);
  --ink3: rgba(232,228,220,.25);
  --accent: #7db8a4;
  --accent2: #a08bc8;
  --deep: #080c14;
  --ease: cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--deep);font-family:'PingFang SC','Helvetica Neue',sans-serif}

/* ─── canvas bg ─── */
#canvas{position:fixed;inset:0;z-index:0}

/* ─── app shell ─── */
#app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,24px) 28px env(safe-area-inset-bottom,32px)}

/* ─── header ─── */
.header{width:100%;display:flex;align-items:center;justify-content:space-between;padding-top:8px}
.logo{font-size:22px;font-weight:300;letter-spacing:.15em;color:var(--ink)}
.session-badge{font-size:11px;letter-spacing:.12em;color:var(--ink2);border:1px solid var(--ink3);border-radius:20px;padding:4px 12px}

/* ─── step dots ─── */
.dots{display:flex;gap:7px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:var(--ink3);transition:all .4s var(--ease)}
.dot.cur{background:var(--accent);width:18px;border-radius:3px}
.dot.done{background:var(--ink2)}

/* ─── center stage ─── */
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;width:100%}

/* ─── orb ─── */
.orb-wrap{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center}
.orb-ring{position:absolute;border-radius:50%;border:1px solid rgba(125,184,164,.15);animation:ripple 3.5s ease-out infinite}
.orb-ring:nth-child(1){width:200px;height:200px;animation-delay:0s}
.orb-ring:nth-child(2){width:160px;height:160px;animation-delay:1.1s}
.orb-ring:nth-child(3){width:120px;height:120px;animation-delay:2.2s}
@keyframes ripple{0%{opacity:.5;transform:scale(.85)}100%{opacity:0;transform:scale(1.1)}}
.orb{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform 1s var(--ease),background .8s,box-shadow .8s;position:relative;z-index:1}
.orb-label{font-size:12px;letter-spacing:.1em;color:rgba(232,228,220,.7);font-weight:300}

/* breath states */
.orb.inhale{transform:scale(1.5);animation:none}
.orb.hold{transform:scale(1.5)}
.orb.exhale{transform:scale(1);animation:none}

/* ─── phase text ─── */
.phase-area{margin-top:20px;text-align:center;min-height:52px;display:flex;flex-direction:column;align-items:center;gap:6px}
.phase-name{font-size:13px;letter-spacing:.18em;color:var(--ink2);text-transform:uppercase;font-weight:300}
.phase-count{font-size:36px;font-weight:200;color:var(--ink);letter-spacing:-.01em;min-width:48px;text-align:center;line-height:1}

/* ─── instruction ─── */
.instruction{text-align:center;max-width:280px}
.instruction h2{font-size:22px;font-weight:300;color:var(--ink);letter-spacing:.04em;margin-bottom:10px;line-height:1.35}
.instruction p{font-size:14px;color:var(--ink2);line-height:1.75;font-weight:300}

/* ─── music strip ─── */
.music-strip{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 16px;width:100%;max-width:320px}
.music-name{font-size:12px;color:var(--ink2);flex:1;letter-spacing:.04em}
.waveform{display:flex;align-items:flex-end;gap:2px;height:16px}
.wb{width:3px;border-radius:2px;background:var(--accent);opacity:.6}

/* ─── controls ─── */
.controls{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;align-items:center}
.btn-primary{width:100%;padding:17px;border-radius:16px;border:none;font-size:16px;font-weight:400;letter-spacing:.08em;cursor:pointer;color:#fff;transition:opacity .2s,transform .1s;position:relative;overflow:hidden}
.btn-primary:active{transform:scale(.97);opacity:.85}
.btn-ghost{background:transparent;border:1px solid var(--ink3);color:var(--ink2);width:100%;padding:13px;border-radius:14px;font-size:13px;letter-spacing:.06em;cursor:pointer;transition:border-color .2s,color .2s}
.btn-ghost:hover{border-color:var(--ink2);color:var(--ink)}

/* ─── transitions ─── */
.fade-enter{animation:fadeUp .5s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ─── completion screen ─── */
.stat-row{display:flex;gap:24px;justify-content:center;margin:8px 0}
.stat{text-align:center}
.stat-num{font-size:32px;font-weight:200;color:var(--ink)}
.stat-label{font-size:11px;letter-spacing:.12em;color:var(--ink2);margin-top:2px}

/* ─── install banner ─── */
#install-banner{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(8,12,20,.95);border-top:1px solid rgba(255,255,255,.08);padding:16px 24px;z-index:99;flex-direction:column;gap:8px}
#install-banner p{font-size:13px;color:var(--ink2);line-height:1.5}
#install-banner strong{color:var(--ink)}
.banner-row{display:flex;gap:10px}
.btn-install{flex:1;padding:11px;border-radius:12px;border:none;font-size:14px;cursor:pointer;background:var(--accent);color:#fff;letter-spacing:.04em}
.btn-dismiss{flex:1;padding:11px;border-radius:12px;border:1px solid var(--ink3);background:transparent;color:var(--ink2);font-size:14px;cursor:pointer}

/* ─── reduced motion ─── */
@media(prefers-reduced-motion:reduce){
  .orb-ring,.wb{animation:none!important}
  .orb{transition:none}
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="app">
  <div class="header">
    <div class="logo">息</div>
    <div class="session-badge" id="session-badge">第 1 次练习</div>
  </div>
  <div class="dots" id="dots"></div>
  <div class="stage" id="stage"></div>
  <div id="controls-area"></div>
</div>

<div id="install-banner">
  <p><strong>添加到主屏幕</strong>，随时打开，离线可用</p>
  <div class="banner-row">
    <button class="btn-install" id="btn-install">添加到主屏幕</button>
    <button class="btn-dismiss" id="btn-dismiss">稍后再说</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   CANVAS PARTICLE BACKGROUND
═══════════════════════════════════════════ */
(function(){
  const c = document.getElementById('canvas');
  const ctx = c.getContext('2d');
  let W,H,pts=[],hue=210;

  function resize(){
    W=c.width=innerWidth; H=c.height=innerHeight;
  }
  resize(); addEventListener('resize',resize);

  for(let i=0;i<55;i++) pts.push({
    x:Math.random()*1200-100, y:Math.random()*800-100,
    vx:(Math.random()-.5)*.18, vy:(Math.random()-.5)*.12,
    r:Math.random()*1.8+.4, a:Math.random()*.4+.05
  });

  function draw(){
    ctx.clearRect(0,0,W,H);
    // subtle gradient sky
    const g=ctx.createRadialGradient(W*.5,H*.35,0,W*.5,H*.35,H*.9);
    g.addColorStop(0,`hsla(${hue},30%,8%,1)`);
    g.addColorStop(1,'hsla(220,25%,4%,1)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<-20)p.x=W+20; if(p.x>W+20)p.x=-20;
      if(p.y<-20)p.y=H+20; if(p.y>H+20)p.y=-20;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,210,200,${p.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
  window.setHue=function(h,sat,light){hue=h;}
})();

/* ═══════════════════════════════════════════
   WEB AUDIO ENGINE
═══════════════════════════════════════════ */
const Audio = (function(){
  let ctx, nodes={}, running=false;

  function ensure(){
    if(!ctx) ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==='suspended') ctx.resume();
  }

  function noise(type){
    const buf=ctx.createBuffer(1,ctx.sampleRate*3,ctx.sampleRate);
    const d=buf.getChannelData(0);
    let last=0;
    for(let i=0;i<d.length;i++){
      const w=Math.random()*2-1;
      d[i]=type==='brown'?(last+.02*w)/1.02:w;
      last=d[i];
    }
    const src=ctx.createBufferSource();
    src.buffer=buf; src.loop=true;
    return src;
  }

  function makeBowl(freq,gain){
    const osc=ctx.createOscillator();
    const env=ctx.createGain();
    const g=ctx.createGain();
    osc.type='sine'; osc.frequency.value=freq;
    env.gain.setValueAtTime(0,ctx.currentTime);
    env.gain.linearRampToValueAtTime(gain,ctx.currentTime+2);
    env.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+12);
    osc.connect(env); env.connect(g); g.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+13);
  }

  const presets={
    nature:{label:'自然白噪音 · 流水声',fn:function(){
      const n=noise('brown'),f=ctx.createBiquadFilter(),g=ctx.createGain();
      f.type='lowpass'; f.frequency.value=900; g.gain.value=.18;
      n.connect(f); f.connect(g); g.connect(ctx.destination); n.start();
      nodes.noiseNode=n; nodes.noiseGain=g;
    }},
    bowl:{label:'颂钵 · θ波冥想音',fn:function(){
      const n=noise('brown'),f=ctx.createBiquadFilter(),g=ctx.createGain();
      f.type='bandpass'; f.frequency.value=300; f.Q.value=.5;
      g.gain.value=.1; n.connect(f); f.connect(g); g.connect(ctx.destination); n.start();
      nodes.noiseNode=n; nodes.noiseGain=g;
      setInterval(()=>makeBowl([396,432,528][Math.floor(Math.random()*3)],.06),6000);
      makeBowl(432,.08);
    }},
    ocean:{label:'深海波浪 · α脑波',fn:function(){
      const n=noise('brown'),lfo=ctx.createOscillator(),lfoG=ctx.createGain(),g=ctx.createGain();
      lfo.frequency.value=.1; lfoG.gain.value=.12; g.gain.value=.22;
      lfo.connect(lfoG); lfoG.connect(g.gain); n.connect(g); g.connect(ctx.destination);
      n.start(); lfo.start();
      nodes.noiseNode=n; nodes.noiseGain=g; nodes.lfo=lfo;
    }},
    forest:{label:'雨林晨鸣 · 自然声场',fn:function(){
      const n=noise('brown'),f=ctx.createBiquadFilter(),g=ctx.createGain();
      f.type='highpass'; f.frequency.value=600; g.gain.value=.14;
      n.connect(f); f.connect(g); g.connect(ctx.destination); n.start();
      nodes.noiseNode=n; nodes.noiseGain=g;
    }}
  };

  return{
    play:function(preset){
      ensure();
      this.stop();
      if(presets[preset]) presets[preset].fn();
      running=true;
      return presets[preset]?.label||'';
    },
    stop:function(){
      if(nodes.noiseNode){try{nodes.noiseNode.stop();}catch(e){}}
      if(nodes.lfo){try{nodes.lfo.stop();}catch(e){}}
      nodes={}; running=false;
    },
    fadeOut:function(){
      if(nodes.noiseGain){
        nodes.noiseGain.gain.linearRampToValueAtTime(0,ctx.currentTime+2);
        setTimeout(()=>this.stop(),2200);
      }
    },
    ringBell:function(){
      ensure();
      makeBowl(528,.12);
    }
  };
})();

/* ═══════════════════════════════════════════
   SESSION DATA
═══════════════════════════════════════════ */
let sessions = parseInt(localStorage.getItem('xi_sessions')||'0');
let totalMin = parseInt(localStorage.getItem('xi_minutes')||'0');
document.getElementById('session-badge').textContent = `第 ${sessions+1} 次练习`;

/* ═══════════════════════════════════════════
   STEPS DEFINITION
═══════════════════════════════════════════ */
const STEPS=[
  {
    id:'welcome',
    title:'息',
    sub:'正念冥想 · 10分钟\n为自己留一段安静的时光',
    orbColor:'rgba(90,130,180,.3)',
    orbShadow:'0 0 40px rgba(90,130,180,.2)',
    hue:215,
    sound:null,
    breathMode:false,
    btn:'开始练习',
    btnGrad:'linear-gradient(135deg,#4a7898,#6a9ab8)',
    ghost:null
  },
  {
    id:'settle',
    title:'安住',
    sub:'感受身体与地面的接触\n让重力把你带到此刻',
    orbColor:'rgba(80,155,175,.32)',
    orbShadow:'0 0 50px rgba(80,155,175,.18)',
    hue:195,
    sound:'nature',
    breathMode:false,
    btn:'继续',
    btnGrad:'rgba(255,255,255,.08)',
    ghost:'跳过'
  },
  {
    id:'breath',
    title:'随息',
    sub:'把全部注意力放在呼吸上\n只是感受，不需要控制',
    orbColor:'rgba(80,175,140,.35)',
    orbShadow:'0 0 60px rgba(80,175,140,.2)',
    hue:162,
    sound:'ocean',
    breathMode:true,
    btn:'继续',
    btnGrad:'rgba(255,255,255,.08)',
    ghost:'暂停音频'
  },
  {
    id:'observe',
    title:'观照',
    sub:'念头升起，如云朵飘过\n你是天空，不是云',
    orbColor:'rgba(140,100,200,.3)',
    orbShadow:'0 0 55px rgba(140,100,200,.18)',
    hue:265,
    sound:'bowl',
    breathMode:false,
    btn:'继续',
    btnGrad:'rgba(255,255,255,.08)',
    ghost:'暂停音频'
  },
  {
    id:'return',
    title:'归来',
    sub:'轻轻地回到呼吸\n每一次回来，都是成功',
    orbColor:'rgba(80,175,130,.38)',
    orbShadow:'0 0 60px rgba(80,175,130,.22)',
    hue:155,
    sound:'forest',
    breathMode:true,
    btn:'完成练习',
    btnGrad:'linear-gradient(135deg,#3a7a5a,#5aa07a)',
    ghost:null
  },
  {
    id:'done',
    title:'完成',
    sub:null,
    orbColor:'rgba(160,139,200,.28)',
    orbShadow:'0 0 50px rgba(160,139,200,.2)',
    hue:270,
    sound:null,
    breathMode:false,
    btn:'再次练习',
    btnGrad:'rgba(255,255,255,.08)',
    ghost:'分享给朋友'
  }
];

/* ═══════════════════════════════════════════
   BREATH CONTROLLER
═══════════════════════════════════════════ */
let breathInterval=null, breathPhase='inhale', breathCount=4;
const phases=[
  {name:'吸气',dur:4,state:'inhale'},
  {name:'屏息',dur:4,state:'hold'},
  {name:'呼气',dur:6,state:'exhale'},
];
let phaseIdx=0;

function startBreath(){
  stopBreath();
  phaseIdx=0; breathCount=phases[0].dur;
  runBreath();
}

function runBreath(){
  const p=phases[phaseIdx];
  breathPhase=p.state;
  breathCount=p.dur;
  updateOrbState();
  setPhaseUI(p.name, breathCount);
  breathInterval=setInterval(()=>{
    breathCount--;
    setPhaseUI(p.name, breathCount);
    if(breathCount<=0){
      clearInterval(breathInterval);
      phaseIdx=(phaseIdx+1)%phases.length;
      runBreath();
    }
  },1000);
}

function stopBreath(){
  clearInterval(breathInterval);
  breathInterval=null;
}

function setPhaseUI(name,count){
  const pn=document.getElementById('phase-name');
  const pc=document.getElementById('phase-count');
  if(pn) pn.textContent=name;
  if(pc) pc.textContent=count;
}

function updateOrbState(){
  const orb=document.getElementById('orb');
  if(!orb) return;
  orb.className='orb '+breathPhase;
}

/* ═══════════════════════════════════════════
   WAVEFORM ANIMATOR
═══════════════════════════════════════════ */
function makeWaveform(){
  const heights=[10,6,13,5,11,8,14,6,9,5,12,7];
  return heights.map((h,i)=>{
    const dur=(.4+i*.07).toFixed(2);
    const delay=(i*.06).toFixed(2);
    return `<div class="wb" style="height:${h}px;animation:waveAnim ${dur}s ${delay}s ease-in-out infinite alternate"></div>`;
  }).join('');
}

/* ═══════════════════════════════════════════
   RENDER STEP
═══════════════════════════════════════════ */
let currentStep=0, audioMuted=false;

function render(idx){
  stopBreath();
  currentStep=idx;
  const s=STEPS[idx];
  setHue(s.hue);

  // dots
  const dotsEl=document.getElementById('dots');
  dotsEl.innerHTML=STEPS.slice(0,-1).map((_,i)=>{
    const cl=i<idx?'dot done':i===idx?'dot cur':'dot';
    return `<div class="${cl}"></div>`;
  }).join('');

  // sound
  if(s.sound && !audioMuted){
    Audio.play(s.sound);
  } else if(!s.sound){
    Audio.fadeOut();
  }

  // bell on key transitions
  if(idx===1||idx===5) Audio.ringBell();

  // build stage HTML
  let stageHTML='';

  if(s.id==='done'){
    sessions++; totalMin+=10;
    localStorage.setItem('xi_sessions',sessions);
    localStorage.setItem('xi_minutes',totalMin);

    stageHTML=`
      <div class="orb-wrap">
        <div class="orb-ring"></div><div class="orb-ring"></div>
        <div class="orb" id="orb" style="background:${s.orbColor};box-shadow:${s.orbShadow}">
          <div class="orb-label">✓</div>
        </div>
      </div>
      <div class="phase-area"></div>
      <div class="instruction fade-enter" style="margin-top:24px">
        <h2>很好。</h2>
        <p>你给了自己一段安静的时光</p>
      </div>
      <div class="stat-row" style="margin-top:20px">
        <div class="stat"><div class="stat-num">${sessions}</div><div class="stat-label">次练习</div></div>
        <div class="stat"><div class="stat-num">${totalMin}</div><div class="stat-label">分钟专注</div></div>
        <div class="stat"><div class="stat-num">${Math.round(sessions/7)||1}</div><div class="stat-label">周连续</div></div>
      </div>
    `;
  } else {
    stageHTML=`
      <div class="orb-wrap">
        <div class="orb-ring"></div><div class="orb-ring"></div><div class="orb-ring"></div>
        <div class="orb" id="orb" style="background:${s.orbColor};box-shadow:${s.orbShadow};${s.breathMode?'':''}">
          <div class="orb-label" id="orb-icon">息</div>
        </div>
      </div>
      <div class="phase-area">
        <div class="phase-name" id="phase-name">${s.breathMode?'吸气':''}</div>
        <div class="phase-count" id="phase-count">${s.breathMode?'4':''}</div>
      </div>
      <div class="instruction fade-enter" style="margin-top:${s.breathMode?'4px':'16px'}">
        <h2>${s.title}</h2>
        <p>${(s.sub||'').replace('\n','<br>')}</p>
      </div>
    `;
  }

  document.getElementById('stage').innerHTML=stageHTML;

  if(s.breathMode) startBreath();

  // controls
  let soundLabel='';
  if(s.sound) soundLabel=Audio.play(s.sound); // get label (already playing)

  const musicHTML = s.sound ? `
    <div class="music-strip">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(232,228,220,.4)" stroke-width="1.5" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <span class="music-name">${soundLabel||'环境音乐'}</span>
      <div class="waveform" style="animation-play-state:${audioMuted?'paused':'running'}">${makeWaveform()}</div>
    </div>` : '';

  const ghostHTML = s.ghost ? `<button class="btn-ghost" onclick="ghostAction()">${s.ghost}</button>` : '';

  document.getElementById('controls-area').innerHTML=`
    <div class="controls">
      ${musicHTML}
      <button class="btn-primary" style="background:${s.btnGrad}" onclick="nextStep()">${s.btn}</button>
      ${ghostHTML}
    </div>
  `;
}

function nextStep(){
  if(currentStep<STEPS.length-1) render(currentStep+1);
  else render(0);
}

function ghostAction(){
  const s=STEPS[currentStep];
  if(s.ghost==='跳过') render(currentStep+1);
  else if(s.ghost==='暂停音频'){
    audioMuted=!audioMuted;
    if(audioMuted) Audio.stop();
    else if(s.sound) Audio.play(s.sound);
  } else if(s.ghost==='分享给朋友'){
    if(navigator.share){
      navigator.share({title:'息 · 正念冥想',text:'我刚刚完成了一次正念冥想练习 🌿',url:location.href});
    } else {
      navigator.clipboard?.writeText(location.href);
      alert('链接已复制，分享给朋友吧');
    }
  }
}

/* ═══════════════════════════════════════════
   PWA INSTALL
═══════════════════════════════════════════ */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  setTimeout(()=>{
    document.getElementById('install-banner').style.display='flex';
  },8000);
});
document.getElementById('btn-install').onclick=()=>{
  if(deferredPrompt){ deferredPrompt.prompt(); }
  document.getElementById('install-banner').style.display='none';
};
document.getElementById('btn-dismiss').onclick=()=>{
  document.getElementById('install-banner').style.display='none';
};

/* css anim for waveform bars */
const waveStyle=document.createElement('style');
waveStyle.textContent='@keyframes waveAnim{from{height:3px}to{height:var(--h,12px)}}';
document.head.appendChild(waveStyle);

/* kick off */
render(0);
</script>
