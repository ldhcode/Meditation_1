<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c14">
<title>息 · 正念冥想</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --ink:#e8e4dc;
  --ink2:rgba(232,228,220,.5);
  --ink3:rgba(232,228,220,.18);
  --accent:#7db8a4;
  --deep:#080c14;
  --ease:cubic-bezier(.4,0,.2,1);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html{height:100%;height:-webkit-fill-available}
body{
  height:100%;height:-webkit-fill-available;
  overflow:hidden;background:var(--deep);
  font-family:'PingFang SC','Noto Sans SC','Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ─── canvas ─── */
#canvas{position:fixed;inset:0;z-index:0}

/* ─── shell：三段式布局 ─── */
#app{
  position:relative;z-index:1;
  height:100%;height:-webkit-fill-available;
  display:grid;
  grid-template-rows:auto 1fr auto;
  padding:
    calc(var(--safe-top) + 14px) 24px
    calc(var(--safe-bot) + 16px);
  max-width:480px;margin:0 auto;width:100%;
}

/* ─── 顶栏（练习页用）─── */
.header{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding-bottom:8px;gap:6px;
}
.header.hidden{visibility:hidden;height:0;padding:0;overflow:hidden}
.logo{display:none}
.header-right{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%}
.session-badge{
  font-size:13px;letter-spacing:.1em;color:var(--ink);
  font-weight:300;
}
.dots{display:flex;gap:7px;align-items:center;justify-content:center}
.dot{width:5px;height:5px;border-radius:50%;background:var(--ink3);transition:all .35s var(--ease)}
.dot.cur{background:var(--accent);width:16px;border-radius:3px}
.dot.done{background:rgba(232,228,220,.35)}

/* ─── 欢迎页顶部信息 ─── */
.welcome-top{text-align:center;padding-top:4px;margin-bottom:4px}
.welcome-session{
  font-size:clamp(15px,4.5vw,18px);font-weight:300;
  color:var(--ink);letter-spacing:.08em;margin-bottom:10px;
}
.welcome-dots{display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:2px}
.welcome-dot{width:6px;height:6px;border-radius:50%;background:var(--ink3);transition:all .35s var(--ease)}
.welcome-dot.cur{background:var(--accent);width:20px;border-radius:3px}
.welcome-dot.done{background:rgba(232,228,220,.38)}

/* ─── 中央舞台 ─── */
.stage{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:0;
  overflow:hidden;
}

/* ─── 呼吸球 ─── */
.orb-wrap{
  position:relative;
  width:min(52vw,200px);height:min(52vw,200px);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.orb-ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(125,184,164,.13);
  animation:ripple 3.5s ease-out infinite;
}
.orb-ring:nth-child(1){width:100%;height:100%;animation-delay:0s}
.orb-ring:nth-child(2){width:80%;height:80%;animation-delay:1.1s}
.orb-ring:nth-child(3){width:60%;height:60%;animation-delay:2.2s}
@keyframes ripple{0%{opacity:.5;transform:scale(.85)}100%{opacity:0;transform:scale(1.1)}}
.orb{
  width:44%;height:44%;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:transform 1s var(--ease),background .8s,box-shadow .8s;
  position:relative;z-index:1;gap:2px;
}
.orb-label{font-size:11px;letter-spacing:.08em;color:rgba(232,228,220,.65);font-weight:300}
.orb.inhale{transform:scale(1.5)}
.orb.hold{transform:scale(1.5)}
.orb.exhale{transform:scale(1)}

/* ─── 呼吸相位文字 ─── */
.phase-area{
  margin-top:clamp(10px,3vw,18px);
  text-align:center;min-height:48px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.phase-name{font-size:12px;letter-spacing:.16em;color:var(--ink2);font-weight:300}
.phase-count{font-size:clamp(28px,8vw,38px);font-weight:200;color:var(--ink);line-height:1}

/* ─── 引导文字 ─── */
.instruction{
  text-align:center;
  padding:0 8px;
  margin-top:clamp(8px,3vw,16px);
}
.instruction h2{
  font-size:clamp(18px,5vw,22px);font-weight:300;
  color:var(--ink);letter-spacing:.04em;
  margin-bottom:8px;line-height:1.3;
}
.instruction p{
  font-size:clamp(13px,3.5vw,14px);
  color:var(--ink2);line-height:1.7;font-weight:300;
}

/* ─── 底部控制区 ─── */
#controls-area{width:100%}
.controls{
  width:100%;display:flex;flex-direction:column;
  gap:10px;align-items:stretch;
}

/* ─── 选择器行（时长 + 呼吸节律）─── */
.picker-row{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;
}
.picker-block{
  background:rgba(255,255,255,.04);
  border:1px solid var(--ink3);border-radius:14px;
  padding:10px 12px;
}
.picker-label{
  font-size:10px;letter-spacing:.12em;color:var(--ink2);
  margin-bottom:8px;
}
.picker-opts{display:flex;flex-wrap:wrap;gap:6px}
.popt{
  font-size:13px;padding:0 12px;border-radius:999px;
  border:1px solid var(--ink3);background:transparent;
  color:var(--ink2);cursor:pointer;transition:all .2s;
  white-space:nowrap;min-height:44px;display:flex;
  align-items:center;justify-content:center;
}
.popt:active{transform:scale(.95)}
.popt.active{
  border-color:rgba(125,184,164,.7);
  color:var(--accent);background:rgba(125,184,164,.1);
}
.popt-lg{font-size:13px;padding:0 12px;width:100%;min-height:44px}

/* 自定义时长输入 */
.custom-row{
  display:none;align-items:center;gap:6px;margin-top:6px;
}
.custom-row.show{display:flex}
.custom-row input{
  width:52px;padding:5px 8px;border-radius:8px;
  border:1px solid var(--ink3);background:rgba(255,255,255,.06);
  color:var(--ink);font-size:14px;text-align:center;
}
.custom-row span{font-size:12px;color:var(--ink2)}

/* ─── 控制条（音乐/语音）─── */
.ctrl-strip{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--ink3);border-radius:12px;
  padding:10px 14px;
}
.ctrl-label{font-size:12px;color:var(--ink2);flex:1;letter-spacing:.03em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ctrl-btn{
  background:transparent;border:1px solid rgba(255,255,255,.15);
  border-radius:8px;color:var(--ink2);font-size:11px;
  padding:4px 10px;cursor:pointer;transition:all .2s;white-space:nowrap;
  flex-shrink:0;
}
.ctrl-btn.on{
  border-color:rgba(125,184,164,.6);
  color:var(--accent);background:rgba(125,184,164,.08);
}
.waveform{display:flex;align-items:flex-end;gap:2px;height:14px;flex-shrink:0}
.wb{width:3px;border-radius:2px;background:var(--accent);opacity:.55}
.voice-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--accent);opacity:0;transition:opacity .3s;flex-shrink:0;
}
.voice-dot.active{opacity:1;animation:vPulse 1.2s ease-in-out infinite}
@keyframes vPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.7);opacity:1}}

/* ─── 主按钮（拇指友好，56px高）─── */
.btn-primary{
  width:100%;height:56px;border-radius:18px;border:none;
  font-size:16px;font-weight:400;letter-spacing:.06em;
  cursor:pointer;color:#fff;
  transition:opacity .2s,transform .12s;
  -webkit-appearance:none;
}
.btn-primary:active{transform:scale(.97);opacity:.85}

/* ─── 次要按钮 ─── */
.btn-ghost{
  background:transparent;border:1px solid var(--ink3);
  color:var(--ink2);width:100%;height:46px;
  border-radius:14px;font-size:13px;letter-spacing:.05em;
  cursor:pointer;transition:all .2s;
}
.btn-ghost:active{background:rgba(255,255,255,.05)}

/* ─── 完成统计 ─── */
.stat-row{display:flex;gap:0;justify-content:center;margin:12px 0;width:100%}
.stat{
  flex:1;text-align:center;
  border-right:1px solid var(--ink3);
}
.stat:last-child{border-right:none}
.stat-num{font-size:clamp(26px,7vw,34px);font-weight:200;color:var(--ink)}
.stat-label{font-size:10px;letter-spacing:.1em;color:var(--ink2);margin-top:2px}

/* ─── install banner ─── */
#install-banner{
  display:none;position:fixed;
  bottom:0;left:0;right:0;
  background:rgba(8,12,20,.96);
  border-top:1px solid rgba(255,255,255,.08);
  padding:16px 24px calc(var(--safe-bot) + 16px);
  z-index:99;flex-direction:column;gap:10px;
}
#install-banner p{font-size:13px;color:var(--ink2);line-height:1.5}
#install-banner strong{color:var(--ink)}
.banner-row{display:flex;gap:10px}
.btn-install{
  flex:1;height:46px;border-radius:12px;border:none;
  font-size:14px;cursor:pointer;background:var(--accent);color:#fff;
}
.btn-dismiss{
  flex:1;height:46px;border-radius:12px;
  border:1px solid var(--ink3);background:transparent;
  color:var(--ink2);font-size:14px;cursor:pointer;
}

/* ─── 动画 ─── */
.fade-enter{animation:fadeUp .45s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ─── 小屏适配（iPhone SE等，高度<680px）─── */
@media(max-height:680px){
  .orb-wrap{width:min(42vw,160px);height:min(42vw,160px)}
  .phase-area{min-height:40px;margin-top:8px}
  .instruction{margin-top:6px}
  .instruction h2{font-size:17px;margin-bottom:5px}
  .controls{gap:7px}
  .btn-primary{height:50px}
  .picker-block{padding:8px 10px}
}

/* ─── reduced motion ─── */
@media(prefers-reduced-motion:reduce){
  .orb-ring,.wb{animation:none!important}
  .orb{transition:none}
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="app">
  <div class="header" id="main-header">
    <div class="session-badge" id="session-badge">第 1 次练习</div>
    <div class="dots" id="dots"></div>
  </div>
  <div class="stage" id="stage"></div>
  <div id="controls-area"></div>
</div>

<div id="install-banner">
  <p><strong>添加到主屏幕</strong>，随时打开，离线可用</p>
  <div class="banner-row">
    <button class="btn-install" id="btn-install">添加到主屏幕</button>
    <button class="btn-dismiss" id="btn-dismiss">稍后再说</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   CANVAS PARTICLE BACKGROUND
═══════════════════════════════════════════ */
(function(){
  const c = document.getElementById('canvas');
  const ctx = c.getContext('2d');
  let W,H,pts=[],hue=210;

  function resize(){
    W=c.width=innerWidth; H=c.height=innerHeight;
  }
  resize(); addEventListener('resize',resize);

  for(let i=0;i<55;i++) pts.push({
    x:Math.random()*1200-100, y:Math.random()*800-100,
    vx:(Math.random()-.5)*.18, vy:(Math.random()-.5)*.12,
    r:Math.random()*1.8+.4, a:Math.random()*.4+.05
  });

  function draw(){
    ctx.clearRect(0,0,W,H);
    // subtle gradient sky
    const g=ctx.createRadialGradient(W*.5,H*.35,0,W*.5,H*.35,H*.9);
    g.addColorStop(0,`hsla(${hue},30%,8%,1)`);
    g.addColorStop(1,'hsla(220,25%,4%,1)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<-20)p.x=W+20; if(p.x>W+20)p.x=-20;
      if(p.y<-20)p.y=H+20; if(p.y>H+20)p.y=-20;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,210,200,${p.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
  window.setHue=function(h,sat,light){hue=h;}
})();

/* ═══════════════════════════════════════════
   WEB AUDIO ENGINE — 增强自然声版
   更清脆水声 · 丰富鸟鸣 · 多层次自然环境
═══════════════════════════════════════════ */
const Audio = (function(){
  let ctx, nodes={}, timers=[];

  function ensure(){
    if(!ctx) ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==='suspended') ctx.resume();
  }

  /* ── 双声道噪声（立体声更自然）── */
  function mkNoise(type, seconds){
    seconds=seconds||6;
    const rate=ctx.sampleRate;
    const buf=ctx.createBuffer(2,rate*seconds,rate);
    for(let ch=0;ch<2;ch++){
      const d=buf.getChannelData(ch);
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0,last=0;
      for(let i=0;i<d.length;i++){
        const w=Math.random()*2-1+(ch===1?Math.random()*.02-.01:0);
        if(type==='pink'){
          b0=.99886*b0+w*.0555179; b1=.99332*b1+w*.0750759;
          b2=.96900*b2+w*.1538520; b3=.86650*b3+w*.3104856;
          b4=.55000*b4+w*.5329522; b5=-.7616*b5-w*.0168980;
          d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*0.11; b6=w*.115926;
        } else if(type==='brown'){
          d[i]=(last+.02*w)/1.02; last=d[i]; d[i]*=3.5;
        } else { d[i]=w; }
      }
    }
    const src=ctx.createBufferSource();
    src.buffer=buf; src.loop=true; return src;
  }

  /* ── 滤波链 ── */
  function chain(src, filters, gainVal){
    let node=src;
    filters.forEach(f=>{ node.connect(f); node=f; });
    const g=ctx.createGain(); g.gain.value=gainVal;
    node.connect(g); g.connect(ctx.destination);
    src.start(); nodes.noiseGain=g; nodes.noiseNode=src;
    return g;
  }

  /* ── 独立增益节点（多层叠加）── */
  function addLayer(src, filters, gainVal, key){
    let node=src;
    filters.forEach(f=>{ node.connect(f); node=f; });
    const g=ctx.createGain(); g.gain.value=gainVal;
    node.connect(g); g.connect(ctx.destination);
    src.start();
    nodes[key||('layer_'+Date.now())]=src;
    nodes[(key||'layer')+'_gain']=g;
    return g;
  }

  /* ── LFO ── */
  function lfo(target, rate, depth){
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.frequency.value=rate; g.gain.value=depth;
    o.connect(g); g.connect(target); o.start();
    nodes['lfo_'+Date.now()]=o; return o;
  }

  /* ── 清脆水滴（多谐波）── */
  function droplet(freq, delay, vol){
    vol=vol||.07;
    // 基音
    [1, 1.5, 2.3].forEach((mult,i)=>{
      const osc=ctx.createOscillator(), env=ctx.createGain();
      osc.type='sine'; osc.frequency.value=freq*mult;
      const t=ctx.currentTime+delay;
      const pk=vol/(i+1);
      env.gain.setValueAtTime(0,t);
      env.gain.linearRampToValueAtTime(pk,t+.008);
      env.gain.exponentialRampToValueAtTime(.0001,t+.5+i*.15);
      osc.connect(env); env.connect(ctx.destination);
      osc.start(t); osc.stop(t+.7+i*.2);
    });
    // 水花噪声瞬态
    const nb=ctx.createBuffer(1,ctx.sampleRate*.04,ctx.sampleRate);
    const nd=nb.getChannelData(0);
    for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
    const ns=ctx.createBufferSource(); ns.buffer=nb;
    const nf=ctx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=freq*1.8; nf.Q.value=2;
    const ng=ctx.createGain(); ng.gain.value=vol*.4;
    ns.connect(nf); nf.connect(ng); ng.connect(ctx.destination);
    ns.start(ctx.currentTime+delay);
  }

  /* ── 水滴序列 ── */
  function startDroplets(minF,maxF,minI,maxI,vol){
    function sched(){
      droplet(minF+Math.random()*(maxF-minF), 0, vol||.07);
      timers.push(setTimeout(sched, minI+Math.random()*(maxI-minI)));
    }
    timers.push(setTimeout(sched, Math.random()*minI));
  }

  /* ── 增强鸟鸣（多音节、颤音、滑音）── */
  function chirp(baseFreq, delay, style){
    style=style||'simple';
    const out=ctx.createGain(); out.gain.value=.06; out.connect(ctx.destination);

    function note(freq, t, dur, glide){
      const car=ctx.createOscillator(), env=ctx.createGain();
      car.type='sine';
      car.frequency.setValueAtTime(freq,t);
      if(glide) car.frequency.exponentialRampToValueAtTime(glide,t+dur*.8);
      env.gain.setValueAtTime(0,t);
      env.gain.linearRampToValueAtTime(1,t+.02);
      env.gain.setValueAtTime(1,t+dur-.03);
      env.gain.exponentialRampToValueAtTime(.0001,t+dur);
      // 颤音 LFO
      const vib=ctx.createOscillator(), vibG=ctx.createGain();
      vib.frequency.value=8+Math.random()*4; vibG.gain.value=freq*.015;
      vib.connect(vibG); vibG.connect(car.frequency);
      car.connect(env); env.connect(out);
      car.start(t); car.stop(t+dur+.05);
      vib.start(t); vib.stop(t+dur+.05);
    }

    const t=ctx.currentTime+delay;
    if(style==='trill'){
      // 颤鸣：快速交替两音
      for(let i=0;i<6;i++) note(baseFreq*(i%2?1:1.12), t+i*.06, .08);
    } else if(style==='slide'){
      // 滑音：由低到高
      note(baseFreq*.85, t, .3, baseFreq*1.05);
    } else if(style==='phrase'){
      // 三音短句
      note(baseFreq, t, .18);
      note(baseFreq*1.15, t+.2, .15);
      note(baseFreq*.92, t+.38, .25);
    } else {
      // 简单单音
      note(baseFreq, t, .2+Math.random()*.15);
    }
  }

  /* ── 蟋蟀声（高频脉冲）── */
  function cricket(delay){
    const rate=80+Math.random()*20;
    const freq=4200+Math.random()*800;
    let count=0, maxCount=8+Math.floor(Math.random()*12);
    function pulse(){
      if(count++>=maxCount) return;
      const osc=ctx.createOscillator(), env=ctx.createGain();
      osc.type='square'; osc.frequency.value=freq;
      const t=ctx.currentTime+delay/1000;
      env.gain.setValueAtTime(0,t);
      env.gain.linearRampToValueAtTime(.018,t+.002);
      env.gain.exponentialRampToValueAtTime(.0001,t+.025);
      osc.connect(env); env.connect(ctx.destination);
      osc.start(t); osc.stop(t+.03);
      timers.push(setTimeout(pulse, 1000/rate));
    }
    pulse();
  }

  /* ── 丰富鸟鸣调度器 ── */
  const BIRD_SPECIES=[
    {freq:2800, style:'trill',  weight:3},
    {freq:3400, style:'slide',  weight:2},
    {freq:2200, style:'phrase', weight:2},
    {freq:4000, style:'simple', weight:2},
    {freq:1800, style:'phrase', weight:1},
    {freq:3800, style:'trill',  weight:2},
    {freq:2600, style:'slide',  weight:2},
    {freq:3100, style:'phrase', weight:3},
  ];
  const BIRD_POOL=[];
  BIRD_SPECIES.forEach(b=>{ for(let i=0;i<b.weight;i++) BIRD_POOL.push(b); });

  function startBirds(density){
    density=density||1; // 1=普通, 2=密集
    const minWait=Math.round(1500/density);
    const maxWait=Math.round(4000/density);

    function schedBird(){
      const b=BIRD_POOL[Math.floor(Math.random()*BIRD_POOL.length)];
      const variation=.88+Math.random()*.24;
      chirp(b.freq*variation, 0, b.style);
      // 偶尔加对唱（另一只鸟回应）
      if(Math.random()<.35){
        const b2=BIRD_POOL[Math.floor(Math.random()*BIRD_POOL.length)];
        chirp(b2.freq*(.9+Math.random()*.2), .6+Math.random()*.8, b2.style);
      }
      timers.push(setTimeout(schedBird, minWait+Math.random()*(maxWait-minWait)));
    }
    // 错开启动，让鸟声从不同方向涌现
    for(let i=0;i<Math.ceil(density);i++){
      timers.push(setTimeout(schedBird, i*800+Math.random()*1200));
    }
  }

  /* ── 蟋蟀调度器 ── */
  function startCrickets(){
    function sched(){
      cricket(0);
      timers.push(setTimeout(sched, 3000+Math.random()*6000));
    }
    timers.push(setTimeout(sched, 2000+Math.random()*3000));
  }

  /* ── 山涧溪流（清脆版）── */
  function startStream(){
    // 主流水：带通滤波强化中频咕噜声
    const pink=mkNoise('pink',6);
    const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=800; bp.Q.value=.4;
    const lo=ctx.createBiquadFilter(); lo.type='lowpass'; lo.frequency.value=3500;
    chain(pink,[bp,lo],.22);
    lfo(nodes.noiseGain.gain,.2,.07);
    lfo(bp.frequency,.15,250);
    // 高频水花层
    const pink2=mkNoise('pink',4);
    const hi=ctx.createBiquadFilter(); hi.type='highpass'; hi.frequency.value=3000;
    const pk=ctx.createBiquadFilter(); pk.type='peaking'; pk.frequency.value=5000; pk.gain.value=5;
    addLayer(pink2,[hi,pk],.06,'splash');
    lfo(nodes['splash_gain'].gain,.25,.03);
    // 清脆水滴：高频短促
    startDroplets(500,1100,400,1800,.09);
    // 偶尔大水滴
    startDroplets(260,420,2500,6000,.12);
    // 晨鸟点缀
    startBirds(.8);
  }

  /* ── 海浪声 ── */
  function startOcean(){
    const brown=mkNoise('brown',8);
    const lo=ctx.createBiquadFilter(); lo.type='lowpass'; lo.frequency.value=650;
    const pk=ctx.createBiquadFilter(); pk.type='peaking'; pk.frequency.value=180; pk.gain.value=6;
    chain(brown,[lo,pk],.3);
    lfo(nodes.noiseGain.gain,.055,.12);
    lfo(lo.frequency,.04,220);
    // 浪花碎裂高频
    const pink=mkNoise('pink',4);
    const hf=ctx.createBiquadFilter(); hf.type='highpass'; hf.frequency.value=2800;
    const hpk=ctx.createBiquadFilter(); hpk.type='peaking'; hpk.frequency.value=5000; hpk.gain.value=4;
    addLayer(pink,[hf,hpk],.055,'foam');
    lfo(nodes['foam_gain'].gain,.07,.04);
    // 海鸥偶尔叫
    function seagull(){
      chirp(1200+Math.random()*400, 0, 'slide');
      timers.push(setTimeout(seagull, 8000+Math.random()*15000));
    }
    timers.push(setTimeout(seagull, 5000));
  }

  /* ── 山间细雨 ── */
  function startRain(){
    // 雨声主体
    const pink=mkNoise('pink',5);
    const hi=ctx.createBiquadFilter(); hi.type='highpass'; hi.frequency.value=1000;
    const lo=ctx.createBiquadFilter(); lo.type='lowpass'; lo.frequency.value=9000;
    const pk=ctx.createBiquadFilter(); pk.type='peaking'; pk.frequency.value=3500; pk.gain.value=5;
    chain(pink,[hi,pk,lo],.13);
    lfo(nodes.noiseGain.gain,.08,.04);
    // 低频积水层
    const brown=mkNoise('brown',4);
    const bf=ctx.createBiquadFilter(); bf.type='bandpass'; bf.frequency.value=350; bf.Q.value=.4;
    addLayer(brown,[bf],.07,'puddle');
    lfo(nodes['puddle_gain'].gain,.06,.03);
    // 雨滴打叶声（中频短脉冲）
    startDroplets(300,700,150,500,.055);
    // 积水水滴
    startDroplets(600,1000,1200,3500,.08);
    // 远处鸟鸣（雨中偶尔）
    startBirds(.4);
  }

  /* ── 森林清晨（鸟鸣最丰富）── */
  function startForest(){
    // 微风底层
    const pink=mkNoise('pink',6);
    const lo=ctx.createBiquadFilter(); lo.type='lowpass'; lo.frequency.value=1600;
    const hi=ctx.createBiquadFilter(); hi.type='highpass'; hi.frequency.value=180;
    chain(pink,[lo,hi],.07);
    lfo(nodes.noiseGain.gain,.08,.022);
    // 树叶沙沙（高频）
    const leaf=mkNoise('pink',4);
    const lf=ctx.createBiquadFilter(); lf.type='highpass'; lf.frequency.value=4500;
    const lpk=ctx.createBiquadFilter(); lpk.type='peaking'; lpk.frequency.value=7000; lpk.gain.value=4;
    addLayer(leaf,[lf,lpk],.05,'leaf');
    lfo(nodes['leaf_gain'].gain,.16,.025);
    // 丰富鸟鸣（density=2，晨鸣高峰）
    startBirds(2);
    // 蟋蟀（背景）
    startCrickets();
    // 偶尔树滴水珠
    startDroplets(700,1400,5000,12000,.06);
  }

  const presets={
    nature:{ label:'山涧溪流 · 清脆流水', fn: startStream },
    ocean:{  label:'海浪声 · 潮涌潮退',   fn: startOcean  },
    rain:{   label:'山间细雨 · 雨打芭蕉', fn: startRain   },
    forest:{ label:'森林清晨 · 百鸟齐鸣', fn: startForest },
  };

  /* ── 铃声 ── */
  function bell(freq,gain){
    ensure();
    [1,2,3,4].forEach((h,i)=>{
      const o=ctx.createOscillator(), e=ctx.createGain();
      o.type='sine'; o.frequency.value=freq*h;
      e.gain.setValueAtTime(0,ctx.currentTime);
      e.gain.linearRampToValueAtTime(gain/(i+1),ctx.currentTime+.015);
      e.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+5-i*.6);
      o.connect(e); e.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime+5.5);
    });
  }

  return{
    play:function(preset){
      ensure(); this.stop();
      if(presets[preset]) presets[preset].fn();
      return presets[preset]?.label||'';
    },
    stop:function(){
      timers.forEach(t=>clearTimeout(t)); timers=[];
      Object.keys(nodes).forEach(k=>{
        try{ nodes[k].stop(); }catch(e){}
      });
      nodes={};
    },
    fadeOut:function(){
      Object.values(nodes).forEach(n=>{
        if(n && n.gain) try{ n.gain.linearRampToValueAtTime(0, ctx.currentTime+2.5); }catch(e){}
      });
      setTimeout(()=>this.stop(), 2800);
    },
    ringBell:function(){ bell(528,.1); }
  };
})();

/* ═══════════════════════════════════════════
   MP3 PLAYER
   播放仓库中的 music.mp3
═══════════════════════════════════════════ */
const Mp3 = (function(){
  let el=null;

  function ensure(){
    if(el) return el;
    el=new window.Audio('music.mp3');
    el.loop=true;
    el.volume=0.55;
    // 淡入
    el.addEventListener('play',()=>{
      el.volume=0;
      let v=0;
      const fade=setInterval(()=>{
        v=Math.min(v+.04,.55);
        el.volume=v;
        if(v>=.55) clearInterval(fade);
      },80);
    });
    return el;
  }

  return{
    play(){
      const a=ensure();
      if(a.paused) a.play().catch(()=>{});
    },
    pause(){
      if(!el) return;
      // 淡出再暂停
      let v=el.volume;
      const fade=setInterval(()=>{
        v=Math.max(v-.05,0);
        el.volume=v;
        if(v<=0){ clearInterval(fade); el.pause(); }
      },60);
    },
    stop(){
      if(!el) return;
      el.pause(); el.currentTime=0; el.volume=0;
    }
  };
})();

/* ═══════════════════════════════════════════
   VOICE GUIDE ENGINE
   Web Speech API — 普通话 TTS
═══════════════════════════════════════════ */
const Voice = (function(){
  const synth = window.speechSynthesis;
  let enabled = true;
  let speaking = false;
  let voiceObj = null;
  let breathVoiceInterval = null;

  // 每个步骤的引导词脚本
  const SCRIPTS = {
    welcome: [],
    settle: [
      { delay: 1000,  text: '现在，让我们开始今天的练习。' },
      { delay: 9000,  text: '请找一个舒适的姿势，坐下来，或者躺着都可以。' },
      { delay: 19000, text: '轻轻闭上眼睛。' },
      { delay: 27000, text: '感受你的身体和地面、椅子的接触。感受这份重量和支撑。' },
      { delay: 42000, text: '让身体沉下来，不需要做任何事，只是在这里。' },
    ],
    breath: [
      { delay: 1000,  text: '现在，把注意力带到呼吸上。' },
      { delay: 12000, text: '感受每一次吸气时，气息从鼻尖流入，胸腔或腹部轻轻升起。' },
      { delay: 28000, text: '呼气时，感受气息缓缓流出，身体慢慢放松。' },
      { delay: 45000, text: '不需要控制呼吸，只是观察它自然的节律。' },
      { delay: 70000, text: '如果思绪飘走了，没关系。轻轻把注意力带回呼吸，这就是练习本身。' },
      { delay: 100000,text: '每一次回来，都是成功。' },
    ],
    observe: [
      { delay: 1000,  text: '很好。现在，我们扩大觉察的范围。' },
      { delay: 12000, text: '注意此刻出现的一切：声音、感觉、念头……不抓取，不排斥。' },
      { delay: 30000, text: '如果有念头升起，像看着云朵飘过天空一样，只是看着它。' },
      { delay: 50000, text: '你是天空，不是云。念头来了又去，你始终在这里。' },
      { delay: 75000, text: '如果被念头带走了，温柔地回来。不评判自己，只是回来。' },
    ],
    return: [
      { delay: 1000,  text: '我们来到最后一个阶段。把注意力轻轻带回呼吸。' },
      { delay: 16000, text: '感受此刻身体的感觉，感受呼吸的节律。' },
      { delay: 34000, text: '给自己一份感谢，感谢你为自己留下这段时光。' },
      { delay: 52000, text: '慢慢地，开始感受周围的空间。准备好之后，睁开眼睛。' },
    ],
    done: [
      { delay: 1000,  text: '练习完成了。很好。' },
      { delay: 7000,  text: '带着这份平静，回到你的日常。' },
    ],
  };

  // 呼吸语音提示词
  const BREATH_VOICE = {
    inhale: '吸气',
    hold:   '屏住',
    exhale: '呼气',
  };

  function getVoice(){
    if(voiceObj) return voiceObj;
    const voices = synth.getVoices();
    // 优先选择温柔的普通话女声
    const preferred = [
      v => v.lang==='zh-CN' && /Xiaoxiao|晓晓/i.test(v.name),      // 微软晓晓：最温柔自然
      v => v.lang==='zh-CN' && /Xiaoyi|晓伊/i.test(v.name),        // 微软晓伊：柔和女声
      v => v.lang==='zh-CN' && /Tingting|婷婷/i.test(v.name),      // Apple 婷婷
      v => v.lang==='zh-CN' && /Female|女/i.test(v.name),
      v => v.lang==='zh-CN' && !/Male|男/i.test(v.name),
      v => v.lang==='zh-CN',
      v => v.lang.startsWith('zh'),
    ];
    for(const test of preferred){
      const found = voices.find(test);
      if(found){ voiceObj=found; return found; }
    }
    return voices[0]||null;
  }

  function speak(text, opts={}){
    if(!enabled || !synth) return;
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang   = 'zh-CN';
    utt.rate   = opts.rate  || 0.68;   // 慢速：冥想引导韵味（原0.88）
    utt.pitch  = opts.pitch || 1.06;   // 略微上扬：更轻柔女声（原0.95）
    utt.volume = opts.volume|| 0.85;   // 稍轻：像耳边低语
    const v = getVoice();
    if(v) utt.voice = v;
    utt.onstart = ()=>{ speaking=true; updateRipple(true); };
    utt.onend   = ()=>{ speaking=false; updateRipple(false); };
    utt.onerror = ()=>{ speaking=false; updateRipple(false); };
    synth.speak(utt);
  }

  function updateRipple(active){
    const r=document.getElementById('voice-ripple');
    if(r) r.classList.toggle('active', active);
    const lbl=document.getElementById('voice-status');
    if(lbl) lbl.textContent = active ? '正在播报' : (enabled ? '语音引导开启' : '语音引导关闭');
  }

  let scriptTimers=[];

  function runScript(stepId){
    clearScript();
    if(!enabled) return;
    const lines=(SCRIPTS[stepId]||[]);
    lines.forEach(line=>{
      const t=setTimeout(()=>speak(line.text), line.delay);
      scriptTimers.push(t);
    });
  }

  function clearScript(){
    scriptTimers.forEach(t=>clearTimeout(t));
    scriptTimers=[];
    if(synth) synth.cancel();
    speaking=false; updateRipple(false);
  }

  // 呼吸节拍语音（只播报阶段切换那一刻）
  function announceBreath(phase){
    if(!enabled) return;
    speak(BREATH_VOICE[phase]||'', {rate:0.72, pitch:1.06, volume:0.6});
  }

  return{
    init(){
      // 预加载 voices（Chrome需要）
      if(synth.getVoices().length===0){
        synth.addEventListener('voiceschanged',()=>getVoice(),{once:true});
      } else { getVoice(); }
    },
    speak,
    runScript,
    clearScript,
    announceBreath,
    toggle(){
      enabled=!enabled;
      if(!enabled){ clearScript(); }
      return enabled;
    },
    get enabled(){ return enabled; },
    get speaking(){ return speaking; },
  };
})();

let breathInterval=null, breathPhase='inhale', breathCount=4;
/* ═══════════════════════════════════════════
   BREATH RHYTHM CONFIG
═══════════════════════════════════════════ */
const BREATH_PATTERNS={
  '4-4-4':{
    label:'4-4-4 方块呼吸',
    desc:'专注·平衡·军队常用',
    phases:[
      {name:'吸气',dur:4,state:'inhale'},
      {name:'屏息',dur:4,state:'hold'},
      {name:'呼气',dur:4,state:'exhale'},
    ]
  },
  '4-7-8':{
    label:'4-7-8 深度放松',
    desc:'入睡·焦虑平复·最深放松',
    phases:[
      {name:'吸气',dur:4,state:'inhale'},
      {name:'屏息',dur:7,state:'hold'},
      {name:'呼气',dur:8,state:'exhale'},
    ]
  },
};
let selectedPattern='4-4-4';
let phases=BREATH_PATTERNS[selectedPattern].phases;

function startBreath(){
  stopBreath(); phaseIdx=0; runBreath();
}
function runBreath(){
  const p=phases[phaseIdx];
  breathPhase=p.state; breathCount=p.dur;
  updateOrbState(); setPhaseUI(p.name,breathCount);
  Voice.announceBreath(p.state);
  breathInterval=setInterval(()=>{
    breathCount--;
    setPhaseUI(p.name,breathCount);
    if(breathCount<=0){
      clearInterval(breathInterval);
      phaseIdx=(phaseIdx+1)%phases.length;
      runBreath();
    }
  },1000);
}
function stopBreath(){ clearInterval(breathInterval); breathInterval=null; }
function setPhaseUI(name,count){
  const pn=document.getElementById('phase-name');
  const pc=document.getElementById('phase-count');
  if(pn) pn.textContent=name;
  if(pc) pc.textContent=count;
}
function updateOrbState(){
  const orb=document.getElementById('orb');
  if(orb) orb.className='orb '+breathPhase;
}

/* ═══════════════════════════════════════════
   STEP COUNTDOWN TIMER
═══════════════════════════════════════════ */
let countdownInterval=null, countdownSecs=0;

function startCountdown(totalSecs, onDone){
  clearInterval(countdownInterval);
  countdownSecs=totalSecs;
  updateCountdownUI();
  countdownInterval=setInterval(()=>{
    countdownSecs--;
    updateCountdownUI();
    if(countdownSecs<=0){
      clearInterval(countdownInterval);
      Audio.ringBell();
      setTimeout(()=>{ if(onDone) onDone(); },1200);
    }
  },1000);
}

function stopCountdown(){ clearInterval(countdownInterval); countdownInterval=null; }

function updateCountdownUI(){
  const el=document.getElementById('step-timer');
  if(!el) return;
  const m=Math.floor(countdownSecs/60);
  const s=countdownSecs%60;
  el.textContent=`${m}:${s.toString().padStart(2,'0')}`;
  // arc progress
  const arc=document.getElementById('timer-arc');
  if(arc && countdownSecs>=0){
    const total=parseInt(arc.dataset.total)||1;
    const pct=(countdownSecs/total);
    const r=44, circ=2*Math.PI*r;
    arc.style.strokeDashoffset=(circ*pct).toFixed(1);
  }
}

function fmtMins(secs){ return Math.round(secs/60)||1; }

      </div>
      <div class="picker-block">
        <div class="picker-label">呼吸节律</div>
        <div class="picker-opts">${patOpts}</div>
      </div>
    </div>`;
}

window.selectDuration=function(mins){
  selectedMins=mins;
  const ci=document.getElementById('custom-input');
  if(ci) ci.classList.toggle('show', mins===null);
  document.querySelectorAll('.popt').forEach(b=>{
    const label=DURATION_OPTIONS.find(o=>o.mins===mins)?.label;
    if(label && b.textContent.trim()===label) b.classList.add('active');
    else if(DURATION_OPTIONS.some(o=>b.textContent.trim()===o.label)) b.classList.remove('active');
  });
};

window.selectPattern=function(key){
  selectedPattern=key;
  phases=BREATH_PATTERNS[key].phases;
  document.querySelectorAll('.popt').forEach(b=>{
    if(Object.keys(BREATH_PATTERNS).includes(b.textContent.trim())){
      b.classList.toggle('active', b.textContent.trim()===key);
    }
  });
};

/* ═══════════════════════════════════════════
   RENDER STEP
═══════════════════════════════════════════ */
let currentStep=0, audioMuted=false, sessionStartTime=0;

function render(idx){
  stopBreath(); stopCountdown();
  currentStep=idx;
  const s=STEPS[idx];
  setHue(s.hue);

  // 欢迎页隐藏顶栏，其他页显示
  const headerEl=document.getElementById('main-header');
  if(headerEl) headerEl.classList.toggle('hidden', s.id==='welcome');

  // 更新顶栏 dots（练习页用）
  const practiceSteps=STEPS.filter(x=>!['welcome','done'].includes(x.id));
  const practiceIdx=practiceSteps.findIndex(x=>x.id===s.id);
  const dotsEl=document.getElementById('dots');
  dotsEl.innerHTML=practiceSteps.map((_,i)=>{
    const cl=i<practiceIdx?'dot done':i===practiceIdx?'dot cur':'dot';
    return `<div class="${cl}"></div>`;
  }).join('');

  if(s.sound && !audioMuted){
    Audio.stop();
    Mp3.play();
  } else if(!s.sound){
    Mp3.pause();
    Audio.fadeOut();
  }
  if(idx===1||idx===5) Audio.ringBell();

  // voice guide
  Voice.clearScript();
  setTimeout(()=>Voice.runScript(s.id), 600);

  // compute step durations
  const totalSecs=(selectedMins||15)*60;
  const stepDurs=getStepDurations(totalSecs);
  // map practice step index to duration
  const stepDurMap={settle:stepDurs[0],breath:stepDurs[1],observe:stepDurs[2],return:stepDurs[3]};
  const thisDur=stepDurMap[s.id]||0;

  let stageHTML='';

  if(s.id==='welcome'){
    // 欢迎页进度点（4个练习步骤）
    const welcomeDots=practiceSteps.map((_,i)=>`<div class="welcome-dot"></div>`).join('');
    stageHTML=`
      <div class="welcome-top fade-enter">
        <div class="welcome-session">第 ${sessions+1} 次冥想练习</div>
        <div class="welcome-dots">${welcomeDots}</div>
      </div>
      <div class="orb-wrap">
        <div class="orb-ring"></div><div class="orb-ring"></div>
        <div class="orb" id="orb" style="background:${s.orbColor};box-shadow:${s.orbShadow}">
          <div class="orb-label" style="font-size:13px;letter-spacing:.12em">冥想</div>
        </div>
      </div>
      <div class="phase-area"></div>
      <div class="instruction fade-enter">
        <h2>${s.title}</h2>
        <p>${s.sub.replace('\n','<br>')}</p>
      </div>`;

  } else if(s.id==='done'){
    const elapsed=sessionStartTime?Math.round((Date.now()-sessionStartTime)/60000):selectedMins||10;
    sessions++; totalMin+=elapsed;
    localStorage.setItem('xi_sessions',sessions);
    localStorage.setItem('xi_minutes',totalMin);
    stageHTML=`
      <div class="orb-wrap">
        <div class="orb-ring"></div><div class="orb-ring"></div>
        <div class="orb" id="orb" style="background:${s.orbColor};box-shadow:${s.orbShadow}">
          <div class="orb-label">✓</div>
        </div>
      </div>
      <div class="phase-area"></div>
      <div class="instruction fade-enter" style="margin-top:20px">
        <h2>很好。</h2>
        <p>你给了自己 ${elapsed} 分钟安静的时光</p>
      </div>
      <div class="stat-row" style="margin-top:20px">
        <div class="stat"><div class="stat-num">${sessions}</div><div class="stat-label">次练习</div></div>
        <div class="stat"><div class="stat-num">${totalMin}</div><div class="stat-label">累计分钟</div></div>
        <div class="stat"><div class="stat-num">${Math.ceil(sessions/7)}</div><div class="stat-label">完整周数</div></div>
      </div>`;

  } else {
    // practice step — with arc timer
    const arcR=44, arcCirc=(2*Math.PI*arcR).toFixed(1);
    stageHTML=`
      <div class="orb-wrap" style="position:relative">
        <svg width="200" height="200" style="position:absolute;top:0;left:0;transform:rotate(-90deg)">
          <circle cx="100" cy="100" r="${arcR}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="2"/>
          <circle id="timer-arc" cx="100" cy="100" r="${arcR}" fill="none"
            stroke="rgba(255,255,255,.22)" stroke-width="2"
            stroke-dasharray="${arcCirc}" stroke-dashoffset="0"
            data-total="${thisDur}"
            style="transition:stroke-dashoffset 1s linear"/>
        </svg>
        <div class="orb-ring"></div><div class="orb-ring"></div><div class="orb-ring"></div>
        <div class="orb" id="orb" style="background:${s.orbColor};box-shadow:${s.orbShadow}">
          <div class="orb-label" id="step-timer">${fmtMins(thisDur)}:00</div>
        </div>
      </div>
      <div class="phase-area">
        <div class="phase-name" id="phase-name">${s.breathMode?'吸气':''}</div>
        <div class="phase-count" id="phase-count">${s.breathMode?'4':''}</div>
      </div>
      <div class="instruction fade-enter" style="margin-top:${s.breathMode?'4px':'16px'}">
        <h2>${s.title}</h2>
        <p>${s.sub.replace('\n','<br>')}</p>
      </div>`;
  }

  document.getElementById('stage').innerHTML=stageHTML;

  // start timers for practice steps
  if(!['welcome','done'].includes(s.id) && thisDur>0){
    if(idx===1) sessionStartTime=Date.now();
    startCountdown(thisDur, ()=>nextStep());
  }
  if(s.breathMode) startBreath();

  // controls
  const pickHTML=s.hasDuration?pickerHTML():'';

  const musicHTML=s.sound?`
    <div class="ctrl-strip">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(232,228,220,.4)" stroke-width="1.5" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <span class="ctrl-label">music · 冥想음악</span>
      <div class="waveform">${makeWaveform()}</div>
    </div>`:'';

  const voiceHTML=`
    <div class="ctrl-strip">
      <div class="voice-dot${Voice.speaking?' active':''}" id="voice-ripple"></div>
      <span class="ctrl-label" id="voice-status">${Voice.enabled?'语音引导开启':'语音引导关闭'}</span>
      <button class="ctrl-btn${Voice.enabled?' on':''}" id="voice-btn" onclick="toggleVoice()">
        ${Voice.enabled?'关闭':'开启'}
      </button>
    </div>`;

  const ghostHTML=s.ghost?`<button class="btn-ghost" onclick="ghostAction()">${s.ghost}</button>`:'';

  document.getElementById('controls-area').innerHTML=`
    <div class="controls">
      ${pickHTML}
      ${musicHTML}
      ${voiceHTML}
      <button class="btn-primary" style="background:${s.btnGrad}" onclick="nextStep()">${s.btn}</button>
      ${ghostHTML}
    </div>`;
}

function nextStep(){
  if(currentStep<STEPS.length-1){
    // read custom duration if set
    if(selectedMins===null){
      const v=parseInt(document.getElementById('custom-mins')?.value)||15;
      selectedMins=Math.min(60,Math.max(1,v));
    }
    render(currentStep+1);
  } else { render(0); }
}

function ghostAction(){
  const s=STEPS[currentStep];
  if(s.ghost==='跳过'){ stopCountdown(); render(currentStep+1); }
  else if(s.ghost==='暂停音频'){
    audioMuted=!audioMuted;
    if(audioMuted){ Audio.stop(); Mp3.pause(); }
    else{ Mp3.play(); }
  } else if(s.ghost==='分享给朋友'){
    if(navigator.share){
      navigator.share({title:'息 · 正念冥想',text:`我刚刚完成了 ${selectedMins||10} 分钟正念冥想 🌿`,url:location.href});
    } else {
      navigator.clipboard?.writeText(location.href);
      alert('链接已复制，分享给朋友吧');
    }
  }
}

function toggleVoice(){
  const on=Voice.toggle();
  const btn=document.getElementById('voice-btn');
  const lbl=document.getElementById('voice-status');
  if(btn){ btn.textContent=on?'关闭':'开启'; btn.classList.toggle('on',on); }
  if(lbl) lbl.textContent=on?'语音引导开启':'语音引导关闭';
  if(on) Voice.runScript(STEPS[currentStep].id);
}

/* ═══════════════════════════════════════════
   PWA INSTALL
═══════════════════════════════════════════ */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  setTimeout(()=>{ document.getElementById('install-banner').style.display='flex'; },8000);
});
document.getElementById('btn-install').onclick=()=>{
  if(deferredPrompt) deferredPrompt.prompt();
  document.getElementById('install-banner').style.display='none';
};
document.getElementById('btn-dismiss').onclick=()=>{
  document.getElementById('install-banner').style.display='none';
};

/* extra styles */
const xStyle=document.createElement('style');
xStyle.textContent='@keyframes waveAnim{from{height:3px}to{height:var(--h,12px)}}';
document.head.appendChild(xStyle);

Voice.init();
render(0);
</script>
